spring.application.name=progetto-scuola
server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5432/didattica
spring.datasource.username=didattica_user
spring.datasource.password=didattica_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=didattica
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}

# Durata token
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Cookie
app.auth.access-cookie-name=access_token
app.auth.refresh-cookie-name=refresh_token
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax
app.auth.cookie-path=/
app.auth.access-cookie-max-age=900
app.auth.refresh-cookie-max-age=604800